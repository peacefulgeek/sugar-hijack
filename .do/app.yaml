name: the-sugar-detach
region: nyc
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/the-sugar-detach
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: NODE_ENV=production node scripts/start-with-cron.mjs
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: AMAZON_TAG
        value: spankyspinola-20
      # Set these in the DigitalOcean dashboard (not in this file):
      # DATABASE_URL
      # OPENAI_API_KEY
      # OPENAI_BASE_URL
      # OPENAI_MODEL
      # GH_PAT
